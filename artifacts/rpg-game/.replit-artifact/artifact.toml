kind = "web"
previewPath = "/"
title = "RPG 2D - Dark Fantasy"
version = "1.0.0"
id = "artifacts/rpg-game"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20192

[services.development]
run = "pnpm --filter @workspace/rpg-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rpg-game", "run", "build" ]
serve = "static"
publicDir = "artifacts/rpg-game/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20192"
BASE_PATH = "/"
