<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Mundo de Aventuras</title>
    
    <!-- CSS Modularizado -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header-nav.css">
    <link rel="stylesheet" href="inventory.css">
    <link rel="stylesheet" href="character.css">
    <link rel="stylesheet" href="work.css">
    <link rel="stylesheet" href="map.css"> <!-- NOVO CSS DO MAPA -->
</head>
<body>
    <div id="game-ui">
        
        <!-- Ponto de Injeção Modular (Feito pelo JS com segurança) -->
        <div id="header-placeholder"></div>
        <div id="views-placeholder"></div>

        <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
        <nav id="bottom-nav">
            <button class="nav-item active" data-target="mundo"><span class="nav-icon">🌍</span><span class="nav-text">Mundo</span></button>
            <button class="nav-item" data-target="missoes"><span class="nav-icon">📜</span><span class="nav-text">Missões</span></button>
            <button class="nav-item" data-target="trabalhos"><span class="nav-icon">⛏️</span><span class="nav-text">Trabalhos</span></button>
            <button class="nav-item" data-target="mapa"><span class="nav-icon">🗺️</span><span class="nav-text">Mapa</span></button>
            <button class="nav-item" data-target="loja"><span class="nav-icon">⚖️</span><span class="nav-text">Loja</span></button>
            <button class="nav-item" data-target="mochila"><span class="nav-icon">🎒</span><span class="nav-text">Mochila</span></button>
            <button class="nav-item" data-target="habilidades"><span class="nav-icon">🔥</span><span class="nav-text">Habilidades</span></button>
            <button class="nav-item" data-target="personagem"><span class="nav-icon">🛡️</span><span class="nav-text">Personagem</span></button>
        </nav>
    </div>

    <!-- Scripts Modulares -->
    <script type="module" src="js/ui.js"></script>
</body>
</html>
